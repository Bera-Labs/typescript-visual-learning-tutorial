<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TS Concepts — 25 Chapter Interactive Course</title>
<style>
:root{
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
  --r-lg:10px;--r-md:7px;
  --bg:#FAFAF9;--bg2:#F3F2F0;--bg3:#FFFFFF;
  --bd:#E5E4E1;--bd2:#D0CFC9;
  --tx:#1A1A18;--tx2:#4A4A46;--tx3:#8A8A84;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-dk:#3C3489;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-dk:#085041;
  --orange:#EF9F27;--orange-bg:#FAEEDA;--orange-dk:#633806;
  --red:#D85A30;--red-bg:#FAECE7;--red-dk:#712B13;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-bd:#BFDBFE;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1C1C1A;--bg2:#242422;--bg3:#2C2C2A;
  --bd:#3A3A36;--bd2:#4A4A46;
  --tx:#E8E8E4;--tx2:#B0B0AA;--tx3:#707068;
  --purple-bg:#26215C;--purple-dk:#CECBF6;
  --green-bg:#04342C;--green-dk:#9FE1CB;
  --orange-bg:#412402;--orange-dk:#FAC775;
  --red-bg:#4A1B0C;--red-dk:#F5C4B3;
  --blue:#85C1E9;--blue-bg:#0D2137;--blue-bd:#2E86C1;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);font-size:13px;color:var(--tx);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOP NAV */
.topnav{display:flex;align-items:center;gap:0;background:var(--bg2);border-bottom:0.5px solid var(--bd);flex-shrink:0;padding:0 16px;height:44px}
.app-title{font-size:14px;font-weight:600;color:var(--tx);margin-right:16px;white-space:nowrap}
.ch-tabs{display:flex;gap:2px;overflow-x:auto;flex:1;padding:6px 0;scrollbar-width:none}
.ch-tabs::-webkit-scrollbar{display:none}
.ch-tab{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--tx3);transition:all .13s;border:0.5px solid transparent;flex-shrink:0}
.ch-tab:hover{background:var(--bg3);color:var(--tx)}
.ch-tab.active{background:var(--purple-bg);color:var(--purple-dk);border-color:var(--purple)}
.ch-tab.done{color:var(--tx2)}
.progress-pill{font-size:11px;color:var(--tx3);white-space:nowrap;margin-left:8px;flex-shrink:0}

/* MAIN SPLIT */
.content{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;background:var(--bg2);border-right:0.5px solid var(--bd);overflow-y:auto;padding:8px 0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.sideitem{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-left:2px solid transparent;transition:background .12s}
.sideitem:hover{background:var(--bg3)}
.sideitem.active{background:var(--bg3);border-left-color:var(--purple)}
.si-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;background:var(--bd);color:var(--tx2)}
.sideitem.done .si-num{background:var(--green);color:#fff}
.sideitem.active .si-num{background:var(--purple);color:#fff}
.si-info{flex:1;min-width:0}
.si-title{font-size:11px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-tag{font-size:9.5px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:12px 18px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ch-badge{padding:2px 9px;border-radius:99px;font-size:11px;font-weight:500;background:var(--purple-bg);color:var(--purple-dk);flex-shrink:0}
.main-title{font-size:14px;font-weight:500}
.main-body{flex:1;overflow-y:auto;padding:16px 18px}
.main-body::-webkit-scrollbar{width:5px}
.main-body::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

.concept-box{background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--r-lg);padding:12px 14px;margin-bottom:14px}
.concept-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:4px}
.concept-text{font-size:12.5px;line-height:1.75;color:var(--tx2)}
.concept-text strong{font-weight:500;color:var(--tx)}
.concept-text code{font-family:var(--mono);font-size:11px;background:var(--bd);padding:1px 4px;border-radius:3px}
.concept-text em{font-style:italic}

.callout{border-radius:var(--r-md);padding:9px 12px;margin-bottom:13px;font-size:12px;line-height:1.6}
.callout-purple{background:var(--purple-bg);color:var(--purple-dk);border:0.5px solid #AFA9EC}
.callout-green{background:var(--green-bg);color:var(--green-dk);border:0.5px solid #5DCAA5}
.callout-orange{background:var(--orange-bg);color:var(--orange-dk);border:0.5px solid var(--orange)}

.ref-row{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.ref-card{flex:1;min-width:110px;padding:7px 9px;border-radius:var(--r-md);border:0.5px solid var(--bd);background:var(--bg2)}
.ref-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.ref-title{font-size:12px;font-weight:500;color:var(--tx)}
.ref-sub{font-size:10.5px;color:var(--tx3);margin-top:1px;line-height:1.4;font-family:var(--mono)}

.ex-nav{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.ex-arrow{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--bd2);background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .13s;flex-shrink:0}
.ex-arrow:hover:not(:disabled){background:var(--bg2);color:var(--tx)}
.ex-arrow:disabled{opacity:.25;cursor:not-allowed}
.ex-name{font-size:13px;font-weight:500}
.ex-counter{font-size:11px;color:var(--tx3);margin-left:5px}
.ex-desc{font-size:12px;color:var(--tx2);line-height:1.65;margin-bottom:11px}
.ex-desc code{font-family:var(--mono);font-size:11px;background:var(--bd);padding:1px 4px;border-radius:3px}
.ex-desc em{font-style:italic}

.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

.step-bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg2);border-radius:var(--r-md);border:0.5px solid var(--bd);margin-bottom:7px}
.sdots{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--bd2);transition:background .2s;flex-shrink:0}
.sdot.done{background:var(--purple)}.sdot.cur{background:var(--orange)}
.sctr{font-size:11px;font-weight:500;color:var(--tx3);white-space:nowrap}
.sdesc{font-size:11px;color:var(--tx2);text-align:right;min-width:100px}

.nav-row{display:flex;gap:6px;align-items:center;margin-bottom:11px}
.sp{flex:1}
.btn{padding:6px 14px;border-radius:var(--r-md);border:0.5px solid var(--bd2);background:transparent;color:var(--tx);font-size:12px;cursor:pointer;transition:all .13s;font-family:var(--sans)}
.btn:hover:not(:disabled){background:var(--bg2)}
.btn:active:not(:disabled){transform:scale(.98)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-p{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.btn-p:hover:not(:disabled){opacity:.85}

.grid4{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:520px){.grid4{grid-template-columns:1fr}}
.panel{background:var(--bg3);border:0.5px solid var(--bd);border-radius:var(--r-lg);padding:10px 12px;min-height:120px}
.ptitle{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.code-block{background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--r-md);padding:7px 9px;font-family:var(--mono);font-size:10.5px;line-height:1.7;white-space:pre;overflow-x:auto}
.kw{color:#8B5CF6;font-weight:500}.fn{color:#185FA5}.str{color:#059669}.cm{color:var(--tx3);font-style:italic}
.hl{background:var(--orange-bg);border-radius:2px;transition:background .2s}

.cstack{display:flex;flex-direction:column-reverse;gap:3px;min-height:80px}
.frame{padding:4px 8px;border-radius:var(--r-md);font-family:var(--mono);font-size:11px;font-weight:500;border:0.5px solid transparent;transition:all .22s;opacity:0;transform:translateY(4px)}
.frame.show{opacity:1;transform:translateY(0)}
.f-global{background:#F1EFE8;color:#444441;border-color:#B4B2A9}
.f-hof{background:var(--purple-bg);color:var(--purple-dk);border-color:#AFA9EC}
.f-cb{background:var(--green-bg);color:var(--green-dk);border-color:#5DCAA5}
.f-active{background:var(--orange-bg);color:var(--orange-dk);border-color:var(--orange)}
.f-special{background:var(--red-bg);color:var(--red-dk);border-color:#F0997B}
@media(prefers-color-scheme:dark){.f-global{background:#2C2C2A;color:#D3D1C7;border-color:#5F5E5A}}

.dflow{display:flex;flex-direction:column;gap:3px;min-height:80px;max-height:180px;overflow-y:auto}
.ditem{display:flex;align-items:flex-start;gap:5px;padding:3px 6px;border-radius:var(--r-md);font-family:var(--mono);font-size:10px;opacity:0;transform:translateX(-4px);transition:all .2s;line-height:1.5}
.ditem.show{opacity:1;transform:translateX(0)}
.dicon{flex-shrink:0;width:12px;height:12px;border-radius:2px;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:500}
.dtxt{flex:1;word-break:break-word}
.d-input{background:var(--bg2);color:var(--tx)}
.d-input .dicon{background:var(--bd2);color:var(--tx3)}
.d-transform{background:var(--green-bg);color:var(--green-dk)}
.d-transform .dicon{background:#5DCAA5;color:#04342C}
.d-output{background:var(--purple-bg);color:var(--purple-dk)}
.d-output .dicon{background:#AFA9EC;color:#26215C}
.d-special{background:var(--red-bg);color:var(--red-dk)}
.d-special .dicon{background:var(--red);color:#fff}
.log-item{background:var(--bg2);color:var(--tx)}
.log-purple{border-left:2px solid var(--purple)}.log-purple .dicon{background:var(--purple);color:#fff}
.log-green{border-left:2px solid var(--green)}.log-green .dicon{background:var(--green);color:#fff}
.log-orange{border-left:2px solid #BA7517}.log-orange .dicon{background:#BA7517;color:#fff}
.log-red{border-left:2px solid var(--red)}.log-red .dicon{background:var(--red);color:#fff}
.df-div{height:.5px;background:var(--bd);margin:3px 0}
.df-lbl{font-size:9px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;padding:1px 0 2px}

.memsec{margin-bottom:6px}
.memtitle{font-size:9px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px;padding:1px 5px;border-radius:3px;display:inline-block}
.mt-global{background:var(--red-bg);color:var(--red-dk)}
.mt-local{background:var(--green-bg);color:var(--green-dk)}
.mt-closure{background:var(--purple-bg);color:var(--purple-dk)}
@media(prefers-color-scheme:dark){
  .mt-global{background:#4A1B0C;color:#F5C4B3}
  .mt-local{background:#04342C;color:#9FE1CB}
  .mt-closure{background:#26215C;color:#CECBF6}
}
.memrows{display:flex;flex-direction:column;gap:2px}
.memrow{display:flex;align-items:center;font-family:var(--mono);font-size:10px;border-radius:3px;overflow:hidden;opacity:0;transition:all .2s;transform:translateX(-3px)}
.memrow.show{opacity:1;transform:translateX(0)}
.memkey{padding:2px 5px;background:var(--bg2);color:var(--tx2);border-right:.5px solid var(--bd);min-width:60px;font-weight:500;flex-shrink:0;font-size:10px}
.memval{padding:2px 6px;color:var(--tx);background:var(--bg3);flex:1;font-size:10px}
.mv-new{color:var(--purple-dk);font-weight:500}
.mv-changed{color:var(--green-dk);font-weight:500}
.mv-special{color:var(--red-dk);font-weight:500}
@media(prefers-color-scheme:dark){.mv-new{color:#AFA9EC}.mv-changed{color:#5DCAA5}.mv-special{color:#F5C4B3}}
.mem-empty{font-size:10px;color:var(--tx3);font-style:italic;padding:2px 0}

/* Mobile sidebar toggle */
@media(max-width:700px){.sidebar{display:none}.sidebar.open{display:block;position:fixed;left:0;top:44px;bottom:0;z-index:100;box-shadow:2px 0 12px rgba(0,0,0,.15)}}
.menu-btn{display:none;background:transparent;border:none;cursor:pointer;font-size:18px;color:var(--tx);padding:0 8px}
@media(max-width:700px){.menu-btn{display:block}}
</style>
</head>
<body>
<div class="topnav">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <span class="app-title">TS Concepts</span>
  <div class="ch-tabs" id="ch-tabs"></div>
  <span class="progress-pill" id="prog-pill">25 chapters</span>
</div>
<div class="content">
  <div class="sidebar" id="sidebar">
    <div id="side-list"></div>
  </div>
  <div class="main">
    <div class="main-header">
      <span class="ch-badge" id="hdr-badge">Ch. 1</span>
      <span class="main-title" id="hdr-title"></span>
    </div>
    <div class="main-body" id="main-body">
      <div class="concept-box"><div class="concept-label">Concept</div><div class="concept-text" id="concept-text"></div></div>
      <div id="callout-area"></div>
      <div id="ref-area"></div>
      <div class="ex-nav">
        <button class="ex-arrow" id="ex-prev" onclick="switchEx(-1)" disabled>&#8592;</button>
        <div style="flex:1"><span class="ex-name" id="ex-name"></span><span class="ex-counter" id="ex-ctr"></span></div>
        <button class="ex-arrow" id="ex-next" onclick="switchEx(1)">&#8594;</button>
      </div>
      <div class="ex-desc" id="ex-desc"></div>
      <div class="legend" id="legend"></div>
      <div class="step-bar">
        <div class="sdots" id="sdots"></div>
        <span class="sctr" id="sctr">0/0</span>
        <span class="sdesc" id="sdesc">Press Next</span>
      </div>
      <div class="nav-row">
        <button class="btn" id="btn-prev" onclick="nav(-1)" disabled>← Prev</button>
        <button class="btn btn-p" id="btn-next" onclick="nav(1)">Next →</button>
        <div class="sp"></div>
        <button class="btn" id="btn-auto" onclick="autoPlay()">Auto-play</button>
      </div>
      <div class="grid4">
        <div class="panel"><div class="ptitle"><div class="pdot" style="background:var(--purple)"></div>Code</div><div class="code-block" id="card-code" style="min-height:80px"></div></div>
        <div class="panel"><div class="ptitle"><div class="pdot" style="background:var(--green)"></div>Call stack</div><div class="cstack" id="card-stack"></div></div>
        <div class="panel"><div class="ptitle"><div class="pdot" style="background:#BA7517"></div>Type checker</div><div class="dflow" id="card-flow"></div></div>
        <div class="panel"><div class="ptitle"><div class="pdot" style="background:var(--red)"></div><span id="mem-panel-title">Type environment</span></div><div id="card-mem"></div></div>
      </div>
    </div>
  </div>
</div>
<script>
const CHAPTERS = [
{num:1,title:"Type Annotations",tag:"string · number · boolean · void · never · any",
concept:"TypeScript adds <strong>type annotations</strong> — explicit labels that tell the compiler what kind of value a variable or function holds. Written as a colon after the name: <code>let name: string</code>. The compiler uses these to catch mismatches <em>before</em> your code ever runs. Core primitives: <code>string</code>, <code>number</code>, <code>boolean</code>. Special types: <code>void</code> (returns nothing), <code>never</code> (never returns normally), <code>any</code> (disables type checking — use sparingly).",
callout:null,
refs:[
  {lbl:"string",cls:"",title:"Text values",sub:"'hello', \"world\", `template`"},
  {lbl:"number",cls:"",title:"All numbers",sub:"int, float, NaN, Infinity"},
  {lbl:"boolean",cls:"",title:"Logical",sub:"true | false only"},
  {lbl:"void",cls:"",title:"No return value",sub:"side-effect functions"},
  {lbl:"never",cls:"",title:"Never completes",sub:"throws or loops forever"},
],
memPanelTitle:"Type environment",
legend:[
  {color:"var(--purple)",label:"Type declared"},
  {color:"var(--green)",label:"Type check ✓"},
  {color:"var(--red)",label:"Type error ✗"},
  {color:"var(--orange)",label:"Currently checking"},
],
examples:[{
  name:"Primitive type annotations",
  desc:"Annotate variables with <code>: string</code>, <code>: number</code>, or <code>: boolean</code>. TypeScript checks every assignment against the declared type and flags mismatches at compile time — before the code runs.",
  code:`<span class="kw">let</span> <span id="gc0">name</span>: <span class="kw">string</span> = <span class="str">"Alice"</span>;
<span class="kw">let</span> <span id="gc1">age</span>: <span class="kw">number</span> = 30;
<span class="kw">let</span> <span id="gc2">ok</span>: <span class="kw">boolean</span> = <span class="kw">true</span>;
<span id="gc3">name</span> = <span class="str">"Bob"</span>;   <span class="cm">// ✓ still string</span>
<span id="gc4">age</span> = <span class="str">"old"</span>;   <span class="cm">// ✗ string ≠ number</span>
<span id="gc5">ok</span> = 1;        <span class="cm">// ✗ number ≠ boolean</span>`,
  steps:[
    "name: string declared — TS registers this slot as string-only",
    "age: number declared — registered as number-only",
    "ok: boolean declared — registered as boolean-only",
    "name = 'Bob' — string matches :string annotation ✓",
    "age = 'old' — ERROR: Type 'string' not assignable to 'number' ✗",
    "ok = 1 — ERROR: Type 'number' not assignable to 'boolean' ✗",
  ],
  hl:["gc0","gc1","gc2","gc3","gc4","gc5"],
  frames:[
    [{l:"module()",t:"f-global"}],
    [{l:"module()",t:"f-global"}],
    [{l:"module()",t:"f-global"}],
    [{l:"module()",t:"f-global"},{l:"check: name←string",t:"f-cb"}],
    [{l:"module()",t:"f-global"},{l:"ERROR: age←string",t:"f-special"}],
    [{l:"module()",t:"f-global"},{l:"ERROR: ok←number",t:"f-special"}],
  ],
  flow:[
    [{t:"d-input",i:"→",v:"name declared"},{t:"d-transform",i:"⇒",v:"slot type: string"}],
    [{t:"d-input",i:"→",v:"age declared"},{t:"d-transform",i:"⇒",v:"slot type: number"}],
    [{t:"d-input",i:"→",v:"ok declared"},{t:"d-transform",i:"⇒",v:"slot type: boolean"}],
    [{t:"d-transform",i:"⇒",v:"'Bob' is string"},{t:"log-green",i:"✓",v:"string ← string ✓"}],
    [{t:"d-special",i:"!",v:"'old' is string, slot expects number"},{t:"log-red",i:"✗",v:"Type 'string' not assignable to 'number'"}],
    [{t:"d-special",i:"!",v:"1 is number, slot expects boolean"},{t:"log-red",i:"✗",v:"Type 'number' not assignable to 'boolean'"}],
  ],
  mem:[
    {g:[{k:"name",v:"string",s:"mv-new"}],l:[],c:[]},
    {g:[{k:"name",v:"string"},{k:"age",v:"number",s:"mv-new"}],l:[],c:[]},
    {g:[{k:"name",v:"string"},{k:"age",v:"number"},{k:"ok",v:"boolean",s:"mv-new"}],l:[],c:[]},
    {g:[{k:"name",v:"string ✓"},{k:"age",v:"number"},{k:"ok",v:"boolean"}],l:[],c:[{k:"check",v:"'Bob': string",s:"mv-changed"}]},
    {g:[{k:"name",v:"string"},{k:"age",v:"✗ string",s:"mv-special"},{k:"ok",v:"boolean"}],l:[],c:[{k:"error",v:"string ≠ number",s:"mv-special"}]},
    {g:[{k:"name",v:"string"},{k:"age",v:"number"},{k:"ok",v:"✗ number",s:"mv-special"}],l:[],c:[{k:"error",v:"number ≠ boolean",s:"mv-special"}]},
  ],
},{
  name:"Function parameter & return type annotations",
  desc:"Annotate function <em>parameters</em> and <em>return types</em>. TypeScript checks both the call site (are arguments the right type?) and the function body (does it return the declared type?).",
  code:`<span class="kw">function</span> <span id="gc0">add</span>(a: <span class="kw">number</span>, b: <span class="kw">number</span>): <span class="kw">number</span> {
  <span class="kw">return</span> <span id="gc1">a + b</span>;
}
<span class="kw">const</span> <span id="gc2">r1</span> = add(2, 3);
<span class="kw">const</span> <span id="gc3">r2</span> = add(<span class="str">"x"</span>, 3); <span class="cm">// ✗ wrong arg</span>
<span class="kw">function</span> <span id="gc4">bad</span>(): <span class="kw">number</span> {
  <span class="kw">return</span> <span id="gc5"><span class="str">"oops"</span></span>; <span class="cm">// ✗ wrong return</span>
}`,
  steps:[
    "add declared — TS registers signature: (number, number) → number",

{num:2,title:"Type Inference",tag:"infer · widening · literal types · return type",

{num:3,title:"Interfaces",tag:"interface · optional · readonly · extends",
concept:"An <strong>interface</strong> defines the <em>shape</em> of an object — the names and types of its properties. TypeScript uses <strong>structural typing</strong>: if an object has all the required properties with the right types, it satisfies the interface — no explicit <code>implements</code> needed. Mark properties <code>optional</code> with <code>?</code> (they may be absent) or <code>readonly</code> (they cannot be changed after creation). Interfaces can <code>extend</code> other interfaces to compose shapes.",

{num:6,title:"Intersection Types",tag:"A & B · merge shapes · never conflict",

{num:9,title:"Generics",tag:"<T> · type parameter · constraint · extends",
concept:"<strong>Generics</strong> let you write functions, interfaces, and classes that work with <em>any type</em> while preserving full type safety. The type parameter <code>&lt;T&gt;</code> is a placeholder filled in at each call site. TypeScript infers T from the argument you pass. Use <code>T extends U</code> to <em>constrain</em> T — requiring it to have certain properties — so you can access them safely inside the function.",

{num:10,title:"Type Narrowing & Guards",tag:"typeof · instanceof · is · exhaustive",

{num:14,title:"Optional & Default Parameters",tag:"param? · param=default · optional chaining ?.",

    {g:[{k:"User",v:"{name:str,age:num}",s:"mv-new"}],l:[],c:[]},
    {g:[{k:"User",v:"{name:str,age:num}"},{k:"FrozenUser",v:"Readonly<User>",s:"mv-new"}],l:[],c:[]},
    {g:[{k:"u",v:"FrozenUser ✓",s:"mv-new"}],l:[],c:[{k:"u.name",v:"'Alice' (readonly)"},{k:"u.age",v:"30 (readonly)"}]},
    {g:[{k:"u",v:"FrozenUser"}],l:[],c:[{k:"u.name",v:"'Alice' ← read ✓",s:"mv-changed"}]},
    {g:[{k:"u",v:"FrozenUser"}],l:[],c:[{k:"u.name",v:"write ✗",s:"mv-special"}]},
    {g:[{k:"u",v:"FrozenUser"}],l:[],c:[{k:"u.age",v:"write ✗",s:"mv-special"}]},
  ],
},{
  name:"as const assertion",
  desc:"<code>as const</code> freezes a literal and makes every property <code>readonly</code> with a <em>literal type</em> rather than a widened type. Applied recursively to nested objects.",
  code:`<span class="kw">const</span> config = {
  host: <span class="str">"localhost"</span>,
  port: 3000,
} <span id="gc0"><span class="kw">as</span> <span class="kw">const</span></span>;
<span class="cm">// { readonly host: "localhost"; readonly port: 3000 }</span>
<span id="gc1">config.host</span> = <span class="str">"x"</span>;           <span class="cm">// ✗ readonly</span>
<span class="kw">const</span> <span id="gc2">dirs</span> = [<span class="str">"up"</span>, <span class="str">"down"</span>] <span class="kw">as</span> <span class="kw">const</span>;
<span class="cm">// readonly ["up", "down"]</span>
<span class="kw">const</span> <span id="gc3">d</span>: <span class="str">"up"</span> | <span class="str">"down"</span> = <span id="gc4">dirs[0]</span>;
<span id="gc5">dirs</span>.push(<span class="str">"left"</span>); <span class="cm">// ✗ readonly</span>`,
  steps:[
    "as const — freezes object; every value becomes a literal type",
    "config.host = 'x' — host is readonly 'localhost'; cannot reassign ✗",
    "['up','down'] as const — tuple becomes readonly; values are literals",
    "d: 'up' | 'down' — literal union type from as const tuple ✓",
    "dirs[0] — type: 'up' (literal, not just string) ✓",
    "dirs.push('left') — readonly tuple; push is not allowed ✗",
  ],
  hl:["gc0","gc1","gc2","gc3","gc4","gc5"],
  frames:[
    [{l:"module()",t:"f-global"},{l:"as const → literals",t:"f-hof"}],

    [{l:"module()",t:"f-global"},{l:"as const → readonly tuple",t:"f-hof"}],
    [{l:"module()",t:"f-global"},{l:"literal union type",t:"f-cb"}],
    [{l:"module()",t:"f-global"},{l:"dirs[0]: 'up' literal",t:"f-cb"}],
    [{l:"module()",t:"f-global"},{l:"ERROR: dirs.push",t:"f-special"}],
  ],
  flow:[
    [{t:"d-transform",i:"⇒",v:"as const: host→'localhost', port→3000"},{t:"log-orange",i:"!",v:"literals not widened to string/number"}],

  ],
  mem:[
    {g:[{k:"config.host",v:"'localhost' (literal)",s:"mv-new"},{k:"config.port",v:"3000 (literal)",s:"mv-new"}],l:[],c:[]},

// ── ENGINE ──────────────────────────────────────────
let curCh=0,curEx=0,curStep=-1,autoTimer=null;
const ch=()=>CHAPTERS[curCh];
const ex=()=>ch().examples[curEx];

function buildNav(){
  document.getElementById('ch-tabs').innerHTML=CHAPTERS.map((c,i)=>
    `<div class="ch-tab${i===curCh?' active':' done'}" onclick="loadChapter(${i})">Ch.${c.num} ${c.title}</div>`
  ).join('');
  document.getElementById('side-list').innerHTML=CHAPTERS.map((c,i)=>
    `<div class="sideitem${i===curCh?' active':' done'}" onclick="loadChapter(${i});closeSidebar()">
      <div class="si-num">${c.num}</div>
      <div class="si-info"><div class="si-title">${c.title}</div><div class="si-tag">${c.tag}</div></div>
    </div>`
  ).join('');
  setTimeout(()=>{
    const at=document.querySelector('.ch-tab.active');
    if(at)at.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
    const as=document.querySelector('.sideitem.active');
    if(as)as.scrollIntoView({block:'nearest'});
  },50);
}

function loadChapter(i){
  stopAuto();curCh=i;curEx=0;curStep=-1;
  buildNav();
  const c=ch();
  document.getElementById('hdr-badge').textContent='Ch. '+c.num;
  document.getElementById('hdr-title').textContent=c.title;
  document.getElementById('concept-text').innerHTML=c.concept;
  document.getElementById('mem-panel-title').textContent=c.memPanelTitle||'Type environment';
  const ca=document.getElementById('callout-area');
  ca.innerHTML=c.callout?`<div class="callout ${c.callout.type}">${c.callout.text}</div>`:'';
  const ra=document.getElementById('ref-area');
  ra.innerHTML=c.refs&&c.refs.length?`<div class="ref-row">${c.refs.map(r=>`<div class="ref-card"><div class="ref-lbl">${r.lbl}</div><div class="ref-title">${r.title}</div><div class="ref-sub">${r.sub}</div></div>`).join('')}</div>`:'';
  document.getElementById('legend').innerHTML=(c.legend||[]).map(l=>`<div class="leg-item"><div class="leg-dot" style="background:${l.color}"></div>${l.label}</div>`).join('');
  document.getElementById('card-code').innerHTML=ex().code;
  clearCards();updateExHeader();buildDots();
  document.getElementById('main-body').scrollTop=0;
}

function updateExHeader(){
  const e=ex();
  document.getElementById('ex-name').textContent=e.name;
  document.getElementById('ex-ctr').textContent=` ${curEx+1} of ${ch().examples.length}`;
  document.getElementById('ex-desc').innerHTML=e.desc;
  document.getElementById('ex-prev').disabled=curEx===0;
  document.getElementById('ex-next').disabled=curEx===ch().examples.length-1;
}

function switchEx(dir){
  const n=curEx+dir;
  if(n<0||n>=ch().examples.length)return;
  stopAuto();curEx=n;curStep=-1;
  document.getElementById('card-code').innerHTML=ex().code;
  clearCards();updateExHeader();buildDots();
}

function buildDots(){
  document.getElementById('sdots').innerHTML=ex().steps.map((_,i)=>`<div class="sdot" id="sd${i}"></div>`).join('');
  updateUI();
}

function updateUI(){
  const total=ex().steps.length,s=curStep;
  ex().steps.forEach((_,i)=>{
    const d=document.getElementById('sd'+i);
    if(d)d.className='sdot'+(i<s?' done':i===s?' cur':'');
  });
  document.getElementById('sctr').textContent=s<0?`0/${total}`:`${s+1}/${total}`;
  document.getElementById('sdesc').textContent=s<0?'Press Next':(ex().steps[s]||'');
  document.getElementById('btn-prev').disabled=s<=0;
  document.getElementById('btn-next').disabled=s>=total-1;
  if(s>=total-1&&autoTimer)stopAuto();
}

function renderStep(s){
  const e=ex();
  document.querySelectorAll('[id^="gc"]').forEach(el=>el.classList.remove('hl'));
  const hid=e.hl[s];if(hid){const el=document.getElementById(hid);if(el)el.classList.add('hl');}
  document.getElementById('card-stack').innerHTML=(e.frames[s]||[]).map(f=>`<div class="frame ${f.t} show">${f.l}</div>`).join('');
  renderFlow(e.flow[s]||[]);
  renderMem(e.mem[s]||{g:[],l:[],c:[]});
  updateUI();
}

function renderFlow(items){
  const all=items.filter(x=>x.t!=='log-item'&&!x.t.startsWith('log-')&&x.t!=='log-special');
  const logs=items.filter(x=>x.t==='log-item'||x.t.startsWith('log-')||x.t==='log-special');
  let h='';
  if(all.length){
    h+=`<div class="df-lbl">Type check</div>`;
    all.forEach(d=>{
      const cls=d.t==='d-special'?'d-special':d.t==='d-transform'?'d-transform':d.t==='d-output'?'d-output':'d-input';
      const icon=d.t==='d-special'?'!':d.t==='d-transform'?'⇒':d.t==='d-output'?'←':'→';
      h+=`<div class="ditem ${cls} show"><div class="dicon">${icon}</div><div class="dtxt">${d.v}</div></div>`;
    });
  }
  if(logs.length){
    if(all.length)h+=`<div class="df-div"></div>`;
    h+=`<div class="df-lbl">Result</div>`;
    logs.forEach(l=>{
      const cls=l.t==='log-special'?'d-special log-item':l.t||'log-item log-orange';
      const icon=l.i||'>';
      h+=`<div class="ditem log-item ${cls} show"><div class="dicon">${icon}</div><div class="dtxt">${l.v}</div></div>`;
    });
  }
  document.getElementById('card-flow').innerHTML=h;
}

function renderMem(mem){
  const secs=[
    {k:'g',l:'Global scope',cls:'mt-global'},
    {k:'l',l:'Local scope',cls:'mt-local'},
    {k:'c',l:'Type context',cls:'mt-closure'},
  ];
  document.getElementById('card-mem').innerHTML=secs.map(sec=>{
    const rows=mem[sec.k]||[];
    return `<div class="memsec">
      <span class="memtitle ${sec.cls}">${sec.l}</span>
      <div class="memrows">${rows.length
        ?rows.map(r=>`<div class="memrow show"><span class="memkey">${r.k}</span><span class="memval ${r.s||''}">${r.v}</span></div>`).join('')
        :'<div class="mem-empty">— empty —</div>'
      }</div>
    </div>`;
  }).join('');
}

function clearCards(){
  ['card-stack','card-flow','card-mem'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML='';});
  document.querySelectorAll('[id^="gc"]').forEach(el=>el.classList.remove('hl'));
}

function nav(dir){
  const total=ex().steps.length;
  if(dir===1&&curStep<total-1){curStep++;renderStep(curStep);}
  else if(dir===-1){
    if(curStep>0){curStep--;renderStep(curStep);}
    else if(curStep===0){curStep=-1;clearCards();updateUI();}
  }
}

function stopAuto(){clearInterval(autoTimer);autoTimer=null;const b=document.getElementById('btn-auto');if(b)b.textContent='Auto-play';}
function autoPlay(){
  if(autoTimer){stopAuto();return;}
  if(curStep>=ex().steps.length-1){curStep=-1;clearCards();buildDots();}
  document.getElementById('btn-auto').textContent='Stop';
  autoTimer=setInterval(()=>{
    if(curStep>=ex().steps.length-1){stopAuto();return;}
    curStep++;renderStep(curStep);
  },850);
}

function toggleSidebar(){
  const s=document.getElementById('sidebar');
  s.classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nav(1);}
  if(e.key==='ArrowLeft'){e.preventDefault();nav(-1);}
  if(e.key==='ArrowUp'){e.preventDefault();switchEx(-1);}
  if(e.key==='ArrowDown'){e.preventDefault();switchEx(1);}
  if(e.key==='1'&&e.metaKey===false)loadChapter(Math.max(0,curCh-1));
  if(e.key==='2'&&e.metaKey===false)loadChapter(Math.min(CHAPTERS.length-1,curCh+1));
});

loadChapter(0);
</script>
